              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/EVALservice/cq-performance:
    get:
      tags: [EVALservice]
      operationId: getCqPerformance
      summary: Get competency question performance
      description: Benchmarks SPARQL execution times for each competency question (CQ1-CQ7), grouped by complexity.
      responses:
        "200":
          description: CQ performance metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  sparql_performance:
                    type: object

  /api/EVALservice/quick-summary:
    get:
      tags: [EVALservice]
      operationId: getQuickSummary
      summary: Get quick system summary
      description: Returns a lightweight system status check with key metrics.
      responses:
        "200":
          description: Quick summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  performance_summary:
                    type: object
                  system_status:
                    type: string
                    example: operational

  # ============================================================
  # Additional KGservice endpoints
  # ============================================================

  /api/KGservice/frameworks:
    get:
      tags: [KGservice]
      operationId: getAllFrameworks
      summary: List all reporting frameworks
      description: Returns all SASB frameworks across all supported industries.
      responses:
        "200":
          description: Frameworks listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Framework"
                  count:
                    type: integer

  /api/KGservice/sparql:
    post:
      tags: [KGservice]
      operationId: executeSparqlQuery
      summary: Execute a custom SPARQL query
      description: Executes an arbitrary SPARQL query against the RDF knowledge graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: SPARQL query string
            example:
              query: "SELECT DISTINCT ?industry WHERE { ?industry a esg:Industry }"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: array
                    items:
                      type: object
                  result_count:
                    type: integer
                  query_time_seconds:
                    type: number
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Missing SPARQL query

