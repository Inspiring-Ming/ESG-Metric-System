services:
  - type: web
    name: esg-metric-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 2 "src.api.esg_api:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: "3.9.18"
    plan: free
