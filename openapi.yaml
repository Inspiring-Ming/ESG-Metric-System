                    type: string

# ============================================================
# Reusable Components
# ============================================================

components:
  parameters:
    IndustryPath:
      name: industry
      in: path
      required: true
      description: |
        Industry identifier. Supported values: `semiconductors`, `commercial_banks`
      schema:
        type: string
        enum: [semiconductors, commercial_banks]
      example: semiconductors

  schemas:
    # ----------------------------------------------------------
    # Domain Objects
    # ----------------------------------------------------------

    Industry:
      type: object
      description: An industry supported by the OntoMetric system
      properties:
        industry_id:
          type: string
          description: Machine-readable identifier
          example: semiconductors
        industry_name:
          type: string
          description: Human-readable name
          example: Semiconductors
        reporting_framework:
          type: string
          description: SASB framework assigned to this industry
          example: SASB Semiconductors
        categories_count:
          type: integer
          description: Number of ESG categories in the framework
          example: 9
        total_companies_available:
          type: string
          description: Placeholder — use DRservice to get actual company list
          example: "Available in Step 2"
        description:
          type: string
        data_source:
          type: string
          example: knowledge_graph_service_cq1_cq2

    Framework:
      type: object
      description: A SASB reporting framework
      properties:
        id:
          type: string
          example: sasb_semiconductors
        name:
          type: string
          example: SASB Semiconductors
        industry:
          type: string
          example: semiconductors
        categories_count:
          type: integer
          example: 9
        description:
          type: string
        cq1_source:
          type: string
          description: CQ1 query that produced this result
        categories_preview:
          type: array
          items:
            type: string
          description: First 3 categories as a preview
        service_used:
          type: string
        cq_query:
          type: string

    Category:
      type: object
      description: An ESG category within a reporting framework
      properties:
        category_id:
          type: string
          description: Machine-readable identifier (snake_case)
          example: greenhouse_gas_emissions
        category_name:
          type: string
          description: Human-readable name
          example: Greenhouse Gas Emissions
        metrics_count:
          type: integer
          description: Number of metrics in this category
          example: 3
        sample_metrics:
          type: array
          items:
            type: string
          description: First 3 metric names as a preview
        description:
          type: string
        service_used:
          type: string
        cq_queries:
          type: array
          items:
            type: string

    Metric:
      type: object
      description: An ESG metric with calculation method details
      properties:
        metric_id:
          type: string
          description: SASB metric code
          example: TC-SC-110a.1
        metric_code:
          type: string
          example: TC-SC-110a.1
        metric_name:
          type: string
          example: Gross Global Scope 1 Emissions
        description:
          type: string
          example: Gross global Scope 1 emissions
        unit:
          type: string
          example: "Metric tonnes (t) CO\u2082-e"
        metric_type:
          type: string
          description: Quantitative or Discussion/Analysis
          example: Quantitative
        has_calculation_model:
          type: boolean
          description: Whether this metric requires a calculation model
        calculation_method:
          type: string
          enum: [direct_measurement, calculation_model]
          description: |
            `direct_measurement` — value is looked up directly from external datasets.
            `calculation_model` — value is computed using a Python model with input metrics.
        model_name:
          type: string
          description: Name of the calculation model, or "Direct access" for direct measurements
          example: GHGEmissionIntensityModel
        input_datapoints:
          type: array
          items:
            type: string
          description: Required input metrics for model-based calculations
        model_formula:
          type: string
          description: Mathematical formula or description
          example: "(scope1_emissions + scope2_emissions) / revenue"
        data_access_type:
          type: string
          enum: [Direct access, Model-based calculation]
        complexity:
          type: string
          enum: [Low, High]
          description: Low for direct measurements, High for model-based

    Company:
      type: object
      description: A company with available ESG data
      properties:
        company_name:
          type: string
          example: STMicroelectronics NV
        years_available:
          type: array
          items:
            type: string
          example: ["2023", "2022", "2021"]
        year_count:
          type: integer
          example: 3
        latest_year:
          type: string
          nullable: true
          example: "2023"
        earliest_year:
          type: string
          nullable: true
          example: "2021"
        data_source:
          type: string
          example: enhanced_data_retrieval_service

    # ----------------------------------------------------------
    # Request Bodies
    # ----------------------------------------------------------

    CalculationRequest:
      type: object
      required: [industry, metrics, company_name]
      description: Request body for metric calculation
      properties:
        industry:
          type: string
          enum: [semiconductors, commercial_banks]
          description: Target industry
        metrics:
          type: array
          items:
            type: string
          description: |
            List of metric names or codes to calculate. Duplicates are removed
            automatically. Also accepts `selected_metrics` as an alias.
        company_name:
          type: string
          description: Company name. Also accepts nested `company_data.company_name`.
        year:
          type: string
          description: Reporting year. Also accepts nested `company_data.year`. Defaults to "2024".
          default: "2024"

    BulkAvailabilityRequest:
      type: object
      required: [checks]
      description: Request body for bulk data availability check
      properties:
        checks:
          type: array
          items:
            type: object
            required: [company_name, year]
            properties:
              company_name:
                type: string
              year:
                type: string
              industry:
                type: string

    ReportRequest:
      type: object
      required: [industry, selected_metrics, company_info]
      description: Request body for ESG report generation
      properties:
        industry:
          type: string
          enum: [semiconductors, commercial_banks]
        selected_metrics:
          type: array
          items:
            type: string
          description: Metric names to include in the report
        company_info:
          type: object
          required: [company_name, year]
          properties:
            company_name:
              type: string
            year:
              type: string
        all_calculated_metrics:
          type: array
          items:
            type: object
            properties:
              metric_name:
                type: string
              value:
                type: number
                nullable: true
              status:
                type: string
          description: |
            Optional. Pre-calculated metric results from a previous `/api/CSservice/calculate`
            call. Passing these avoids redundant re-computation during report generation.

    # ----------------------------------------------------------
    # Response Objects
    # ----------------------------------------------------------

    CalculationResult:
      type: object
      description: Result of a single metric calculation
      properties:
        metric_name:
          type: string
        metric_code:
          type: string
        status:
          type: string
          enum: [success, already_calculated, calculation_error, data_unavailable, failed_no_data]
          description: |
            - `success`: Metric calculated or retrieved successfully
            - `already_calculated`: Value returned from cache
            - `data_unavailable`: No data in external datasets
            - `calculation_error`: Calculation failed
        value:
          type: number
          nullable: true
          description: Calculated numeric value, or null if unavailable
        display_value:
          type: string
          description: Formatted value with unit for UI display
        unit:
          type: string
        company_name:
          type: string
        year:
          type: string
        calculation_method:
          type: string
          enum: [direct_measurement, calculation_model]
        data_source:
          type: string
          enum: [external_dataset, calculated_from_real_data]
          description: |
            - `external_dataset`: Value looked up directly from CSV data
            - `calculated_from_real_data`: Value computed by a model using real inputs
        dataset_variable:
          type: string
          description: External dataset column name (for direct measurements)
        model_name:
          type: string
          description: Calculation model used (for model-based calculations)
        calculation_time:
          type: number
          description: Seconds elapsed for this calculation

    CalculationResponse:
      type: object
      description: Full response from the calculation endpoint
      properties:
        status:
          type: string
          example: success
        calculation_results:
          type: array
          items:
            $ref: "#/components/schemas/CalculationResult"
        summary:
          type: object
          properties:
            company_name:
              type: string
            year:
              type: string
            industry:
              type: string
            metrics_requested:
              type: integer
              description: Total metrics in the original request
            unique_metrics_processed:
              type: integer
              description: Metrics after removing duplicates
            metrics_already_calculated:
              type: integer
              description: Metrics returned from cache
            metrics_newly_calculated:
              type: integer
              description: Metrics freshly computed
            metrics_with_real_data:
              type: integer
              description: Direct measurement metrics with data
            metrics_calculated_from_real_data:
              type: integer
              description: Model-based metrics computed from real inputs
            metrics_unavailable:
              type: integer
              description: Metrics with no available data
            duplicates_removed:
              type: integer
            total_calculation_time:
              type: string
              example: "0.234s"
            data_policy:
              type: string
            duplicate_prevention:
              type: string
        data_transparency:
          type: object
          properties:
            authenticity_policy:
              type: string
            unavailable_data_policy:
              type: string
            calculation_engine:
              type: string
            cache_policy:
              type: string

    Report:
      type: object
      description: |
        A comprehensive ESG compliance report. The full report contains detailed
        sections for company profile, executive summary, metric results, data
        transparency, and recommendations. Only the top-level structure is shown here.
      properties:
        schema_version:
          type: string
          example: "2.0"
        report_metadata:
          type: object
          properties:
            report_id:
              type: string
            generation_timestamp:
              type: string
              format: date-time
            report_type:
              type: string
              example: ESG Compliance Assessment
            generated_by:
              type: string
              example: ESG Knowledge Graph System
            data_policy:
              type: string
              example: "Real data only - No synthetic or demo data"
        company_profile:
          type: object
          properties:
            company_name:
              type: string
            reporting_year:
              type: string
            industry_classification:
              type: object
              properties:
                primary_industry:
                  type: string
                reporting_framework:
                  type: string
        executive_summary:
          type: object
          properties:
            overall_assessment:
              type: object
              properties:
                total_metrics_analyzed:
                  type: integer
                metrics_with_data:
                  type: integer
                data_availability_rate:
                  type: number
                  description: Percentage of metrics with available data
                compliance_grade:
                  type: string
                  enum: ["A+", "A", "B+", "B", "C", "D"]
        detailed_results:
          type: object
          properties:
            successful_calculations:
              type: array
              items:
                type: object
            failed_calculations:
              type: array
              items:
                type: object
        data_transparency:
          type: object
          description: Data lineage, quality assessment, and verification status
        recommendations:
          type: object
          properties:
            immediate_actions:
              type: array
              items:
                type: string
            medium_term_goals:
              type: array
              items:
                type: string
            long_term_strategy:
              type: array
              items:
                type: string

    # ----------------------------------------------------------
    # Error
    # ----------------------------------------------------------

    ErrorResponse:
      type: object
      description: Standard error response returned by all endpoints on failure
      properties:
        status:
          type: string
          example: error
        error_category:
          type: string
          description: Machine-readable error type
          enum:
            - KNOWLEDGE_GRAPH_ACCESS_ERROR
            - EXTERNAL_DATA_ACCESS_ERROR
            - FRAMEWORK_NOT_FOUND
            - MISSING_INDUSTRY
          example: KNOWLEDGE_GRAPH_ACCESS_ERROR
        user_message:
          type: string
          description: Human-friendly error message for display
          example: Error accessing industry data from knowledge graph
        suggestion:
          type: string
          description: Suggested action for the user
          example: Please check knowledge graph availability and try again
        technical_message:
          type: string
          description: Detailed technical error information for debugging
